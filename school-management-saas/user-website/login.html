<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .float-anim {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.6s ease forwards;
        }

        .fade-up-2 {
            animation: fadeUp 0.6s ease 0.15s forwards;
            opacity: 0;
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">

    <!-- Background decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl float-anim"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-purple-500/10 rounded-full blur-3xl float-anim"
            style="animation-delay: 2s;"></div>
        <div class="absolute top-1/2 right-1/3 w-64 h-64 bg-blue-500/8 rounded-full blur-3xl float-anim"
            style="animation-delay: 1s;"></div>
    </div>

    <div class="relative w-full max-w-md fade-up">
        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-2xl shadow-indigo-500/30 mb-5">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">School Portal</h1>
            <p class="text-indigo-300/70 mt-2 text-sm font-medium">Sign in as a Student or Teacher</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/[0.06] backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl fade-up-2">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-indigo-200/80 mb-2 uppercase tracking-wider">Email
                        Address</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm"
                        placeholder="you@school.com" autocomplete="email">
                </div>

                <div>
                    <label
                        class="block text-xs font-semibold text-indigo-200/80 mb-2 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm"
                            placeholder="••••••••" autocomplete="current-password">
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error message -->
                <div id="error"
                    class="hidden rounded-xl bg-red-500/10 border border-red-500/20 p-3.5 text-sm text-red-300 font-medium">
                </div>

                <!-- Role detected badge (shown after successful login) -->
                <div id="role-badge" class="hidden rounded-xl p-3.5 text-sm font-semibold text-center"></div>

                <button type="submit" id="loginBtn"
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 hover:-translate-y-0.5 text-sm">
                    Sign In
                </button>
            </form>

            <div class="mt-6 pt-5 border-t border-white/5 text-center">
                <p class="text-xs text-white/30">
                    Forgot your password? <a href="#"
                        class="text-indigo-400 hover:text-indigo-300 font-medium transition">Contact Admin</a>
                </p>
            </div>
        </div>

        <!-- Role indicators -->
        <div class="flex justify-center gap-6 mt-6">
            <div class="flex items-center gap-2 text-xs text-white/30">
                <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
                Students
            </div>
            <div class="flex items-center gap-2 text-xs text-white/30">
                <div class="w-2 h-2 rounded-full bg-purple-400"></div>
                Teachers
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        if (auth.isAuthenticated()) {
            auth.redirectToDashboard();
        }

        // Toggle password visibility
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const roleBadge = document.getElementById('role-badge');
            const loginBtn = document.getElementById('loginBtn');

            try {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>';
                errorDiv.classList.add('hidden');
                roleBadge.classList.add('hidden');

                const userData = await auth.login(email, password);

                // Show role badge
                const role = (userData.role || '').toLowerCase();
                const roleColors = {
                    student: 'bg-emerald-500/10 border-emerald-500/20 text-emerald-300',
                    teacher: 'bg-purple-500/10 border-purple-500/20 text-purple-300'
                };
                const roleLabels = {
                    student: '🎓 Student Portal',
                    teacher: '👨‍🏫 Teacher Portal'
                };

                roleBadge.className = `rounded-xl border p-3.5 text-sm font-semibold text-center ${roleColors[role] || ''}`;
                roleBadge.textContent = `Welcome! Redirecting to ${roleLabels[role] || 'Portal'}...`;
                roleBadge.classList.remove('hidden');

                // Redirect after brief delay for visual feedback
                setTimeout(() => {
                    auth.redirectToDashboard();
                }, 800);

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
