<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance - School Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white">
      <div class="p-6">
        <h1 class="text-2xl font-bold mb-8">School Admin</h1>
        <nav class="space-y-2">
          <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-indigo-700">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Dashboard
          </a>
          <a href="users.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-indigo-700">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            Users
          </a>
          <a href="attendance.html" class="flex items-center px-4 py-3 rounded-lg bg-indigo-700">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
            </svg>
            Attendance
          </a>
          <a href="fees.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-indigo-700">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            Fees
          </a>
          <a href="reports.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-indigo-700">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            Reports
          </a>
        </nav>
      </div>
      <div class="absolute bottom-0 w-64 p-6">
        <button id="logout-btn" class="w-full flex items-center justify-center px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
      <!-- Top Navbar -->
      <header class="bg-white shadow-sm">
        <div class="flex items-center justify-between px-8 py-4">
          <div>
            <h2 class="text-2xl font-bold text-gray-800">Attendance Management</h2>
            <p class="text-sm text-gray-600">Mark student attendance</p>
          </div>
          <div class="flex items-center space-x-4">
            <input type="date" id="attendance-date" class="px-4 py-2 border rounded-lg" value="">
            <button id="mark-attendance-btn" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
              Mark Attendance
            </button>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <main class="flex-1 overflow-y-auto p-8">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Student Name</th>
                <th class="px-6 py-4 text-center text-xs font-semibold text-gray-700 uppercase">Present</th>
                <th class="px-6 py-4 text-center text-xs font-semibold text-gray-700 uppercase">Absent</th>
              </tr>
            </thead>
            <tbody id="students-tbody" class="divide-y divide-gray-200">
              <tr><td colspan="3" class="px-6 py-12 text-center text-gray-500">Loading students...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script>
    const axios = require('axios');
    const API_URL = 'http://localhost:5000/api';
    let token = localStorage.getItem('token');
    let studentsData = [];

    const api = axios.create({
      baseURL: API_URL,
      headers: { 'Content-Type': 'application/json' }
    });

    api.interceptors.request.use(config => {
      if (token) config.headers.Authorization = `Bearer ${token}`;
      return config;
    });

    if (!token) window.location.href = 'index.html';

    // Set today's date
    document.getElementById('attendance-date').valueAsDate = new Date();

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    });

    async function loadStudents() {
      const tbody = document.getElementById('students-tbody');
      try {
        const { data } = await api.get('/students');
        studentsData = data.data;

        if (studentsData.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-12 text-center text-gray-500">No students found</td></tr>';
          return;
        }

        tbody.innerHTML = studentsData.map((student, index) => `
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4">
              <div class="flex items-center">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                  <span class="text-blue-600 font-bold">${(student.userId?.name || 'S').charAt(0)}</span>
                </div>
                <div>
                  <div class="text-sm font-medium text-gray-900">${student.userId?.name || 'N/A'}</div>
                  <div class="text-sm text-gray-500">Class ${student.class} - ${student.section}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-center">
              <input type="radio" name="attendance-${index}" value="Present" data-student-id="${student._id}" checked class="w-4 h-4 text-green-600">
            </td>
            <td class="px-6 py-4 text-center">
              <input type="radio" name="attendance-${index}" value="Absent" data-student-id="${student._id}" class="w-4 h-4 text-red-600">
            </td>
          </tr>
        `).join('');
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-12 text-center text-red-500">Error loading students</td></tr>';
      }
    }

    document.getElementById('mark-attendance-btn').addEventListener('click', async () => {
      const date = document.getElementById('attendance-date').value;
      if (!date) {
        alert('Please select a date');
        return;
      }

      const attendanceRecords = [];
      studentsData.forEach((student, index) => {
        const radios = document.getElementsByName(`attendance-${index}`);
        let status = 'Present';
        for (const radio of radios) {
          if (radio.checked) {
            status = radio.value;
            break;
          }
        }

        // CRITICAL: Always include studentId
        if (student._id) {
          attendanceRecords.push({
            studentId: student._id,
            date: date,
            status: status
          });
        }
      });

      try {
        for (const record of attendanceRecords) {
          await api.post('/attendance', record);
        }
        alert('Attendance marked successfully!');
        loadStudents();
      } catch (error) {
        alert('Error marking attendance: ' + (error.response?.data?.error || error.message));
      }
    });

    loadStudents();
  </script>
</body>
</html>
