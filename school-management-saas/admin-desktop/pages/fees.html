<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fee Management - School Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-gradient-to-b from-gray-900 to-gray-800 text-white flex-shrink-0">
      <div class="p-6">
        <h1 class="text-2xl font-bold mb-8">School Admin</h1>
        <nav class="space-y-2">
          <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Dashboard
          </a>
          <a href="users.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            Users
          </a>
          <a href="attendance.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
            </svg>
            Attendance
          </a>
          <a href="fees.html" class="flex items-center px-4 py-3 rounded-lg bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            Fees
          </a>
          <a href="reports.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            Reports
          </a>
        </nav>
      </div>
      <div class="absolute bottom-0 w-64 p-6">
        <button id="logout-btn" class="w-full flex items-center justify-center px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg transition">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          Logout
        </button>
      </div>
    </aside>
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-white shadow-sm z-10">
        <div class="flex items-center justify-between px-8 py-4">
          <div>
            <h2 class="text-2xl font-bold text-gray-800">Fee Management</h2>
            <p class="text-sm text-gray-600">Manage student fee payments</p>
          </div>
          <div class="flex items-center space-x-4">
            <div class="text-right">
              <p class="text-sm font-medium text-gray-800" id="user-name">Admin User</p>
              <p class="text-xs text-gray-600" id="user-role">School Admin</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-r from-purple-500 to-indigo-600 flex items-center justify-center text-white font-bold">A</div>
          </div>
        </div>
      </header>
      <main class="flex-1 overflow-y-auto p-8">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
          <div class="px-6 py-4 bg-gradient-to-r from-gray-50 to-gray-100 border-b">
            <h3 class="text-lg font-bold text-gray-900">Fee Records</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Student Name</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Class</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Fee Type</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Amount</th>
                  <th class="px-6 py-4 text-center text-xs font-semibold text-gray-700 uppercase">Status</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Due Date</th>
                </tr>
              </thead>
              <tbody id="fees-tbody" class="divide-y divide-gray-200">
                <tr><td colspan="6" class="px-6 py-12 text-center"><p class="text-gray-500">Loading fee records...</p></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script>
    const API_BASE = 'http://localhost:5000/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '../index.html';
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '../index.html';
    });
    async function loadFees() {
      try {
        const response = await fetch(`${API_BASE}/fees`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('Failed to load fees');
        const data = await response.json();
        const tbody = document.getElementById('fees-tbody');
        if (data.data && data.data.length > 0) {
          tbody.innerHTML = data.data.map(fee => `
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4 text-sm text-gray-900">${fee.studentName || '-'}</td>
              <td class="px-6 py-4 text-sm text-gray-600">${fee.class || '-'}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${fee.type}</td>
              <td class="px-6 py-4 text-sm text-gray-900">₹${fee.amount}</td>
              <td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded-full text-xs font-semibold ${fee.status === 'Paid' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${fee.status}</span></td>
              <td class="px-6 py-4 text-sm text-gray-600">${new Date(fee.dueDate).toLocaleDateString()}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-500">No fee records found</td></tr>';
        }
      } catch (error) {
        console.error('Error loading fees:', error);
        document.getElementById('fees-tbody').innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-red-500">Failed to load fee records</td></tr>';
      }
    }
    loadFees();
  </script>
</body>
</html>
