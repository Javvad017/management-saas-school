<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fee Management - School Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
  <div class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-gradient-to-b from-gray-900 to-gray-800 text-white flex-shrink-0">
      <div class="p-6">
        <h1 class="text-2xl font-bold mb-8">School Admin</h1>
        <nav class="space-y-2">
          <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
              </path>
            </svg>
            Dashboard
          </a>
          <a href="users.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
              </path>
            </svg>
            Users
          </a>
          <a href="sections.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
              </path>
            </svg>
            Sections
          </a>
          <a href="attendance.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
              </path>
            </svg>
            Attendance
          </a>
          <a href="fees.html" class="flex items-center px-4 py-3 rounded-lg bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
              </path>
            </svg>
            Fees
          </a>
          <a href="reports.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-700 transition">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
              </path>
            </svg>
            Reports
          </a>
        </nav>
      </div>
      <div class="absolute bottom-0 w-64 p-6">
        <button id="logout-btn"
          class="w-full flex items-center justify-center px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg transition">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          Logout
        </button>
      </div>
    </aside>
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-white shadow-sm z-10">
        <div class="flex items-center justify-between px-8 py-4">
          <div>
            <h2 class="text-2xl font-bold text-gray-800">Fee Management</h2>
            <p class="text-sm text-gray-600">Manage student fee payments</p>
          </div>
          <div class="flex items-center space-x-4">
            <div class="text-right">
              <p class="text-sm font-medium text-gray-800" id="user-name">Admin User</p>
              <p class="text-xs text-gray-600" id="user-role">School Admin</p>
            </div>
            <div
              class="w-10 h-10 rounded-full bg-gradient-to-r from-purple-500 to-indigo-600 flex items-center justify-center text-white font-bold">
              A</div>
          </div>
        </div>
      </header>
      <main class="flex-1 overflow-y-auto p-8">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
          <div class="px-6 py-4 bg-gradient-to-r from-gray-50 to-gray-100 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold text-gray-900">Fee Records</h3>
            <button onclick="openAssignFeeModal()"
              class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium text-sm flex items-center">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              Assign Fee
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Student Name</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Class</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Fee Type</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Amount</th>
                  <th class="px-6 py-4 text-center text-xs font-semibold text-gray-700 uppercase">Status</th>
                  <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase">Due Date</th>
                  <th class="px-6 py-4 text-center text-xs font-semibold text-gray-700 uppercase">Actions</th>
                </tr>
              </thead>
              <tbody id="fees-tbody" class="divide-y divide-gray-200">
                <tr>
                  <td colspan="6" class="px-6 py-12 text-center">
                    <p class="text-gray-500">Loading fee records...</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Assign Fee Modal -->
  <div id="assign-fee-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden border border-gray-100">
      <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <h3 class="text-lg font-bold text-gray-800">Assign Fee</h3>
        <button onclick="closeAssignFeeModal()" class="text-gray-400 hover:text-gray-600 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <form id="assign-fee-form" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Student</label>
          <select id="fee-student" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm">
            <option value="">Select Student</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Fee Type</label>
          <select id="fee-type" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm">
            <option value="">Select Fee Type</option>
            <option value="Tuition">Tuition</option>
            <option value="Transport">Transport</option>
            <option value="Library">Library</option>
            <option value="Exam">Exam</option>
            <option value="Lab">Lab</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
          <input type="number" id="fee-amount" required min="1"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Due Date</label>
          <input type="date" id="fee-due-date" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm">
        </div>
        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-50">
          <button type="button" onclick="closeAssignFeeModal()"
            class="px-4 py-2 text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition font-medium text-sm">Cancel</button>
          <button type="submit"
            class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow-md font-medium text-sm">Save
            Fee</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    const API_BASE = 'http://localhost:5000/api';
    const token = sessionStorage.getItem('token');
    if (!token) window.location.href = '../index.html';
    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('token');
      sessionStorage.removeItem('user');
      window.location.href = '../index.html';
    });
    // UI State handlers
    let studentsLoaded = false;

    async function loadStudents() {
      if (studentsLoaded) return;
      try {
        const response = await fetch(`${API_BASE}/students`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('Failed to load students');
        const data = await response.json();
        const studentSelect = document.getElementById('fee-student');
        
        if (data.data && data.data.length > 0) {
          data.data.forEach(student => {
            const option = document.createElement('option');
            option.value = student._id;
            const studentName = student.userId?.name || 'Unknown';
            const studentClass = student.class || '';
            const studentSection = student.section || '';
            option.textContent = `${studentName} - Class ${studentClass}${studentSection}`;
            studentSelect.appendChild(option);
          });
          studentsLoaded = true;
        } else {
          const option = document.createElement('option');
          option.value = '';
          option.textContent = 'No students available. Please add students first.';
          option.disabled = true;
          studentSelect.appendChild(option);
        }
      } catch (err) {
        console.error('Failed to load students', err);
        const studentSelect = document.getElementById('fee-student');
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'Error loading students. Please try again.';
        option.disabled = true;
        studentSelect.appendChild(option);
      }
    }

    function openAssignFeeModal() {
      document.getElementById('assign-fee-modal').classList.remove('hidden');
      loadStudents();
    }

    function closeAssignFeeModal() {
      document.getElementById('assign-fee-modal').classList.add('hidden');
      document.getElementById('assign-fee-form').reset();
    }

    document.getElementById('assign-fee-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        studentId: document.getElementById('fee-student').value,
        feeType: document.getElementById('fee-type').value,
        amount: Number(document.getElementById('fee-amount').value),
        dueDate: document.getElementById('fee-due-date').value
      };

      try {
        const response = await fetch(`${API_BASE}/fees`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok && data.success) {
          closeAssignFeeModal();
          loadFees();
        } else {
          alert('Failed to save fee: ' + (data.message || 'Unknown error'));
        }
      } catch (err) {
        console.error('Save fee error:', err);
        alert('Failed to connect to the server');
      }
    });

    async function markPaid(feeId) {
      if (!confirm("Are you sure you want to mark this fee as paid?")) return;

      try {
        const response = await fetch(`${API_BASE}/fees/${feeId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status: 'paid' })
        });

        const data = await response.json();
        if (response.ok && data.success) {
          loadFees();
        } else {
          alert('Failed to update fee status: ' + (data.message || 'Unknown error'));
        }
      } catch (err) {
        console.error('Mark paid error:', err);
        alert('Failed to connect to the server');
      }
    }

    async function loadFees() {
      try {
        const response = await fetch(`${API_BASE}/fees`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('Failed to load fees');
        const data = await response.json();
        const tbody = document.getElementById('fees-tbody');
        if (data.data && data.data.length > 0) {
          tbody.innerHTML = data.data.map(fee => {
            const studentName = fee.studentId?.userId?.name || fee.studentName || '-';
            const studentClass = fee.studentId?.class || fee.class || '-';
            const feeType = fee.feeType || fee.type || '-';
            const statusStr = String(fee.status).toLowerCase();
            const statusClass = statusStr === 'paid' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
            const displayStatus = statusStr === 'paid' ? 'Paid' : 'Pending';

            return `
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4 text-sm text-gray-900">${studentName}</td>
              <td class="px-6 py-4 text-sm text-gray-600">${studentClass}</td>
              <td class="px-6 py-4 text-sm text-gray-900">${feeType}</td>
              <td class="px-6 py-4 text-sm text-gray-900">₹${fee.amount}</td>
              <td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded-full text-xs font-semibold ${statusClass}">${displayStatus}</span></td>
              <td class="px-6 py-4 text-sm text-gray-600">${new Date(fee.dueDate).toLocaleDateString()}</td>
              <td class="px-6 py-4 text-center text-sm">
                ${statusStr !== 'paid' ? `<button onclick="markPaid('${fee._id}')" class="text-indigo-600 hover:text-indigo-900 font-medium">Mark Paid</button>` : '<span class="text-gray-400">Paid</span>'}
              </td>
            </tr>
          `}).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500">No fee records found</td></tr>';
        }
      } catch (error) {
        console.error('Error loading fees:', error);
        document.getElementById('fees-tbody').innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-red-500">No fee records found</td></tr>';
      }
    }
    loadFees();
  </script>
</body>

</html>
